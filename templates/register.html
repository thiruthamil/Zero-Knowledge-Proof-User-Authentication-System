<!DOCTYPE html>
<html>
<head>
<title>Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background: linear-gradient(135deg,#00c6ff,#0072ff);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family: Arial;
}

.card{
padding:40px;
width:350px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}
</style>

</head>

<body>

<div class="card">

<h3 class="text-center mb-3">Register</h3>

{% if success %}
<div class="alert alert-success text-center">✔ Registered Successfully</div>
<a href="/login" class="btn btn-success w-100">Continue</a>

{% else %}

<form method="post">

<input class="form-control mb-3" name="username" placeholder="Username">
<input class="form-control mb-3" type="password" name="password" placeholder="Password">

<button class="btn btn-primary w-100">Register</button>

</form>

<!-- ✅ ERROR MOVED BELOW BUTTON -->
{% if error %}
<div class="alert alert-danger mt-3 text-center">
{{error}}
</div>
{% endif %}

{% endif %}

</div>

</body>
</html>
