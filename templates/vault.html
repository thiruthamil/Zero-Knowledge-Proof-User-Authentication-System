<!DOCTYPE html>
<html>
<head>
<title>Vault</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background:#0f172a;
color:white;
font-family:Arial;
}

.container{
margin-top:50px;
}

.box{
background:#020617;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}
</style>
</head>

<body>

<div class="container">

<h2 class="text-center mb-4">Secured Vault</h2>

<!-- Upload -->
<div class="box">
<h5>Upload File</h5>

<form action="/upload" method="post" enctype="multipart/form-data">
<input type="file" name="file" class="form-control mb-2" required>
<button class="btn btn-success">Upload</button>
</form>
</div>

<!-- Files -->
<div class="box">
<h5>Your Files</h5>

{% for file in files %}
<div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #334155;">
<span>{{file}}</span>

<div>
<a href="/view/{{file}}" class="btn btn-sm btn-info">View</a>
<a href="/download/{{file}}" class="btn btn-sm btn-primary">Download</a>
<a href="/delete/{{file}}" class="btn btn-sm btn-danger">Delete</a>
</div>

</div>
{% else %}
<p>No files uploaded</p>
{% endfor %}

</div>

<a href="/dashboard" class="btn btn-secondary w-100">⬅ Back to Dashboard</a>

</div>

</body>
</html>
